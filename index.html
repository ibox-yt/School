<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain Shooter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            border: 3px solid #e94560;
            box-shadow: 0 0 30px #e94560aa;
        }
        #gameCanvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            padding: 10px 16px;
            pointer-events: none;
            z-index: 10;
        }
        .ui-panel {
            background: rgba(0,0,0,0.65);
            border: 1px solid #e9456088;
            border-radius: 6px;
            padding: 6px 14px;
            color: #fff;
            font-size: 14px;
            min-width: 120px;
        }
        .ui-panel span { color: #f5a623; font-weight: bold; }
        #weaponPanel { text-align: center; }
        #ammoBar { margin-top: 4px; display: flex; gap: 3px; justify-content: center; }
        .bullet-dot {
            width: 8px; height: 14px;
            background: #f5a623;
            border-radius: 2px;
            display: inline-block;
        }
        .bullet-dot.empty { background: #555; }
        #healthBar {
            width: 120px; height: 10px;
            background: #333;
            border-radius: 5px;
            margin-top: 4px;
            overflow: hidden;
        }
        #healthFill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #f5a623);
            border-radius: 5px;
            transition: width 0.2s;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.82);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: #fff;
        }
        #overlay h1 {
            font-size: 48px;
            color: #e94560;
            text-shadow: 0 0 20px #e94560;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }
        #overlay h2 {
            font-size: 22px;
            color: #f5a623;
            margin-bottom: 20px;
        }
        #overlay p {
            font-size: 14px;
            color: #aaa;
            margin: 4px 0;
            text-align: center;
        }
        #startBtn, #restartBtn {
            margin-top: 28px;
            padding: 14px 40px;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 20px #e94560aa;
            letter-spacing: 2px;
            transition: background 0.2s, transform 0.1s;
        }
        #startBtn:hover, #restartBtn:hover {
            background: #c73250;
            transform: scale(1.05);
        }
        #scoreDisplay {
            font-size: 32px;
            color: #f5a623;
            margin: 10px 0;
        }
        #killNotif {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #f5a623;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            z-index: 20;
            text-shadow: 0 0 10px #f5a623;
            transition: opacity 0.3s;
            white-space: nowrap;
        }
        #weaponPickupNotif {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            color: #7fff7f;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            z-index: 20;
            text-shadow: 0 0 10px #7fff7f;
            transition: opacity 0.3s;
            white-space: nowrap;
        }
        #waveNotif {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            z-index: 30;
            text-shadow: 0 0 20px #e94560;
            transition: opacity 0.4s;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div class="ui-panel">
            ❤️ HP: <span id="hpText">100</span>
            <div id="healthBar"><div id="healthFill" style="width:100%"></div></div>
        </div>
        <div class="ui-panel" id="weaponPanel">
            🔫 <span id="weaponName">PISTOL</span>
            <div id="ammoBar"></div>
        </div>
        <div class="ui-panel" style="text-align:right;">
            💀 Kills: <span id="killCount">0</span><br>
            🌊 Wave: <span id="waveNum">1</span>
        </div>
    </div>
    <div id="killNotif"></div>
    <div id="weaponPickupNotif"></div>
    <div id="waveNotif"></div>
    <div id="overlay">
        <h1>MOUNTAIN SHOOTER</h1>
        <h2>Survive the waves!</h2>
        <p>🎮 WASD / Arrow Keys — Move</p>
        <p>🖱️ Mouse — Aim & Shoot (Left Click)</p>
        <p>🔄 R — Reload</p>
        <p>🔫 Pistol: 12 shots | 💥 AK-47: 30 shots (rare drop!)</p>
        <p>❤️ Walk over green packs to heal</p>
        <button id="startBtn">▶ PLAY</button>
    </div>
</div>

<script>
// ===================== SETUP =====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = 900, H = 600;
canvas.width = W;
canvas.height = H;
document.getElementById('gameContainer').style.width = W + 'px';
document.getElementById('gameContainer').style.height = H + 'px';

// ===================== STATE =====================
let gameRunning = false;
let kills = 0, wave = 1, waveEnemyCount = 5;
let enemies = [], bullets = [], particles = [], pickups = [];
let keys = {};
let mouseX = W/2, mouseY = H/2;
let animId;
let lastTime = 0;

// Mountain data (generated once)
let mountainLayers = [];

// ===================== WEAPONS =====================
const WEAPONS = {
    pistol: {
        name: 'PISTOL',
        damage: 28,
        fireRate: 400,
        maxAmmo: 12,
        reloadTime: 1200,
        bulletSpeed: 12,
        bulletColor: '#f5d442',
        spread: 0.04,
        auto: false,
    },
    ak47: {
        name: 'AK-47',
        damage: 22,
        fireRate: 110,
        maxAmmo: 30,
        reloadTime: 2000,
        bulletSpeed: 15,
        bulletColor: '#ff6b35',
        spread: 0.10,
        auto: true,
    }
};

// ===================== PLAYER =====================
const player = {
    x: W/2, y: H - 120,
    w: 28, h: 36,
    speed: 3.2,
    hp: 100,
    maxHp: 100,
    weapon: 'pistol',
    ammo: 12,
    reloading: false,
    reloadTimer: 0,
    lastShot: 0,
    angle: 0,
    color: '#4fc3f7',
    bodyColor: '#1565c0',
    legColor: '#0d47a1',
    legAnim: 0,
};

// ===================== MAP =====================
const GROUND_Y = H - 60;
const MAP_TILES = [];

// Generate map obstacles
function generateMap() {
    MAP_TILES.length = 0;
    // Some cover/rocks
    const rocks = [
        {x:120, y:GROUND_Y-40, w:80, h:40},
        {x:680, y:GROUND_Y-40, w:80, h:40},
        {x:380, y:GROUND_Y-60, w:60, h:60},
        {x:200, y:GROUND_Y-30, w:50, h:30},
        {x:620, y:GROUND_Y-30, w:50, h:30},
        {x:460, y:GROUND_Y-35, w:40, h:35},
    ];
    rocks.forEach(r => MAP_TILES.push(r));
}

// ===================== MOUNTAINS (background) =====================
function generateMountains() {
    mountainLayers = [];
    // 3 layers: far, mid, near
    const layers = [
        { count: 7, hMin: 140, hMax: 220, colorTop: '#2d3a4a', colorBase: '#1a2533', yBase: GROUND_Y - 10 },
        { count: 9, hMin: 90, hMax: 160, colorTop: '#3b4f60', colorBase: '#243040', yBase: GROUND_Y },
        { count: 11, hMin: 50, hMax: 100, colorTop: '#546e7a', colorBase: '#37474f', yBase: GROUND_Y + 5 },
    ];
    layers.forEach(layer => {
        let peaks = [];
        const stepX = W / (layer.count - 1);
        for (let i = 0; i < layer.count; i++) {
            peaks.push({
                x: i * stepX + (Math.random() - 0.5) * stepX * 0.5,
                h: layer.hMin + Math.random() * (layer.hMax - layer.hMin),
            });
        }
        mountainLayers.push({ peaks, ...layer });
    });
}

// ===================== ENEMIES =====================
function spawnEnemy() {
    const side = Math.random() < 0.5 ? 'left' : 'right';
    const x = side === 'left' ? -30 : W + 30;
    const y = GROUND_Y - 36;
    const isElite = wave > 2 && Math.random() < 0.2;
    enemies.push({
        x, y,
        w: 26, h: 36,
        speed: 1.1 + Math.random() * 0.6 + wave * 0.08,
        hp: isElite ? 90 : 40 + wave * 5,
        maxHp: isElite ? 90 : 40 + wave * 5,
        color: isElite ? '#e91e63' : '#66bb6a',
        bodyColor: isElite ? '#880e4f' : '#2e7d32',
        damage: isElite ? 18 : 10,
        attackRate: isElite ? 600 : 900,
        lastAttack: 0,
        angle: 0,
        legAnim: 0,
        alive: true,
        shootCooldown: 1500 + Math.random() * 1000,
        lastEnemyShot: 0,
        elite: isElite,
    });
}

let waveSpawnTimer = 0;
let waveSpawnCount = 0;

function startWave(n) {
    wave = n;
    waveEnemyCount = 5 + (n - 1) * 3;
    waveSpawnCount = 0;
    waveSpawnTimer = 0;
    document.getElementById('waveNum').textContent = wave;
    showWaveNotif(`WAVE ${wave}`);
}

// ===================== BULLETS =====================
function fireBullet(fromPlayer, x, y, angle, wepKey) {
    const w = WEAPONS[wepKey];
    const spread = (Math.random() - 0.5) * w.spread;
    const a = angle + spread;
    bullets.push({
        x, y,
        vx: Math.cos(a) * w.bulletSpeed,
        vy: Math.sin(a) * w.bulletSpeed,
        damage: w.damage,
        fromPlayer,
        color: w.bulletColor,
        life: 80,
        r: fromPlayer ? 4 : 3,
    });
}

// ===================== PARTICLES =====================
function spawnParticles(x, y, color, count=8) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            life: 30 + Math.random() * 20,
            maxLife: 50,
            r: 2 + Math.random() * 3,
            color,
        });
    }
}

// ===================== PICKUPS =====================
function spawnPickup(x, y) {
    // 40% chance AK47 drop, 60% health pack
    const roll = Math.random();
    if (roll < 0.40) {
        pickups.push({ x, y: y - 10, type: 'ak47', w: 30, h: 14, life: 600 });
    } else {
        pickups.push({ x, y: y - 10, type: 'health', w: 20, h: 20, life: 600 });
    }
}

// ===================== COLLISION =====================
function rectOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}
function circleRect(cx,cy,cr, rx,ry,rw,rh) {
    const nearX = Math.max(rx, Math.min(cx, rx+rw));
    const nearY = Math.max(ry, Math.min(cy, ry+rh));
    const dx = cx - nearX, dy = cy - nearY;
    return dx*dx + dy*dy < cr*cr;
}

function collidesWithObstacle(x, y, w, h) {
    for (const tile of MAP_TILES) {
        if (rectOverlap(x, y, w, h, tile.x, tile.y, tile.w, tile.h)) return tile;
    }
    return null;
}

// ===================== DRAWING =====================
function drawMountains() {
    mountainLayers.forEach(layer => {
        ctx.beginPath();
        ctx.moveTo(0, layer.yBase);
        layer.peaks.forEach(p => {
            ctx.lineTo(p.x, layer.yBase - p.h);
        });
        ctx.lineTo(W, layer.yBase);
        ctx.closePath();
        const grad = ctx.createLinearGradient(0, layer.yBase - 200, 0, layer.yBase);
        grad.addColorStop(0, layer.colorTop);
        grad.addColorStop(1, layer.colorBase);
        ctx.fillStyle = grad;
        ctx.fill();
    });
}

function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad.addColorStop(0, '#0a0f2c');
    grad.addColorStop(0.5, '#1a2a4a');
    grad.addColorStop(1, '#2d4060');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, GROUND_Y);
}

function drawStars() {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    // Use seeded positions
    for (let i = 0; i < 80; i++) {
        const sx = ((i * 137 + 23) % W);
        const sy = ((i * 97 + 11) % (GROUND_Y * 0.7));
        const sr = ((i * 7) % 3) === 0 ? 1.5 : 0.8;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI*2);
        ctx.fill();
    }
}

function drawGround() {
    // Ground gradient
    const grad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    grad.addColorStop(0, '#3d5a3e');
    grad.addColorStop(0.3, '#2e4430');
    grad.addColorStop(1, '#1a2a1c');
    ctx.fillStyle = grad;
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

    // Ground line
    ctx.strokeStyle = '#5a8a5c';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(W, GROUND_Y);
    ctx.stroke();

    // Grass tufts
    ctx.strokeStyle = '#4caf50';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < W; i += 18) {
        const h2 = 4 + ((i * 7) % 7);
        ctx.beginPath();
        ctx.moveTo(i, GROUND_Y);
        ctx.lineTo(i - 3, GROUND_Y - h2);
        ctx.moveTo(i, GROUND_Y);
        ctx.lineTo(i + 3, GROUND_Y - h2);
        ctx.stroke();
    }
}

function drawObstacles() {
    MAP_TILES.forEach(tile => {
        // Rock shape
        ctx.save();
        const grad = ctx.createLinearGradient(tile.x, tile.y, tile.x, tile.y + tile.h);
        grad.addColorStop(0, '#78909c');
        grad.addColorStop(1, '#455a64');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(tile.x, tile.y, tile.w, tile.h, [10, 10, 4, 4]);
        ctx.fill();
        ctx.strokeStyle = '#546e7a';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.beginPath();
        ctx.roundRect(tile.x + 5, tile.y + 4, tile.w - 20, 6, 3);
        ctx.fill();
        ctx.restore();
    });
}

function drawPerson(x, y, w, h, angle, color, bodyColor, legColor, legAnim, label, hp, maxHp, isElite) {
    ctx.save();
    ctx.translate(x + w/2, y + h/2);
    ctx.rotate(0); // body doesn't rotate, only gun

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, h/2 + 4, w/2 + 2, 5, 0, 0, Math.PI*2);
    ctx.fill();

    // Legs
    const legOff = Math.sin(legAnim) * 6;
    ctx.fillStyle = legColor;
    // Left leg
    ctx.beginPath();
    ctx.roundRect(-w/2 + 2, h/4, 9, h/3 + legOff, 3);
    ctx.fill();
    // Right leg
    ctx.beginPath();
    ctx.roundRect(w/2 - 11, h/4, 9, h/3 - legOff, 3);
    ctx.fill();

    // Body
    const bodyGrad = ctx.createLinearGradient(-w/2, -h/4, w/2, h/4);
    bodyGrad.addColorStop(0, bodyColor);
    bodyGrad.addColorStop(1, color);
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.roundRect(-w/2, -h/3, w, h * 0.65, 5);
    ctx.fill();

    // Elite glow
    if (isElite) {
        ctx.strokeStyle = '#f06292';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(-w/2, -h/3, w, h * 0.65, 5);
        ctx.stroke();
    }

    // Head
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, -h/3 - 10, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = bodyColor;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Eyes
    const eyeDir = Math.cos(angle) > 0 ? 1 : -1;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(eyeDir * 3, -h/3 - 11, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(eyeDir * 3 + eyeDir * 1, -h/3 - 11, 1.5, 0, Math.PI*2);
    ctx.fill();

    // Arm + Gun
    ctx.save();
    ctx.translate(0, -h/3 + 6);
    ctx.rotate(angle);
    // Arm
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(0, -3, 14, 6, 3);
    ctx.fill();
    // Gun body
    if (label === 'ak47') {
        // AK-47 - longer, chunkier
        ctx.fillStyle = '#5d4037';
        ctx.beginPath();
        ctx.roundRect(10, -4, 22, 8, 2);
        ctx.fill();
        ctx.fillStyle = '#3e2723';
        ctx.beginPath();
        ctx.roundRect(10, -6, 18, 3, 1);
        ctx.fill();
        // Magazine
        ctx.fillStyle = '#4e342e';
        ctx.beginPath();
        ctx.roundRect(16, 4, 7, 9, 2);
        ctx.fill();
        // Barrel
        ctx.fillStyle = '#37474f';
        ctx.beginPath();
        ctx.roundRect(32, -2, 10, 4, 1);
        ctx.fill();
        // Muzzle flash hint
        ctx.fillStyle = '#ffd54f';
        ctx.beginPath();
        ctx.arc(42, 0, 2, 0, Math.PI*2);
        ctx.fill();
    } else {
        // Pistol
        ctx.fillStyle = '#37474f';
        ctx.beginPath();
        ctx.roundRect(10, -4, 16, 8, 3);
        ctx.fill();
        // Grip
        ctx.fillStyle = '#263238';
        ctx.beginPath();
        ctx.roundRect(12, 4, 8, 8, 2);
        ctx.fill();
        // Barrel
        ctx.fillStyle = '#546e7a';
        ctx.beginPath();
        ctx.roundRect(24, -2, 8, 4, 1);
        ctx.fill();
    }
    ctx.restore();

    // HP bar (for enemies)
    if (maxHp && hp < maxHp) {
        const bw = w + 6;
        const bx = -bw/2;
        const by = -h/2 - 14;
        ctx.fillStyle = '#333';
        ctx.fillRect(bx, by, bw, 5);
        ctx.fillStyle = hp > maxHp * 0.5 ? '#4caf50' : hp > maxHp * 0.25 ? '#ff9800' : '#f44336';
        ctx.fillRect(bx, by, bw * (hp/maxHp), 5);
    }

    ctx.restore();
}

function drawPickup(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    // Floating bob
    const bob = Math.sin(Date.now() / 300) * 3;
    ctx.translate(0, bob);

    // Glow
    ctx.shadowBlur = 14;
    if (p.type === 'ak47') {
        ctx.shadowColor = '#ff6b35';
        // AK47 crate
        ctx.fillStyle = '#5d4037';
        ctx.beginPath();
        ctx.roundRect(-15, -7, 30, 14, 3);
        ctx.fill();
        ctx.fillStyle = '#ff6b35';
        ctx.font = 'bold 9px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('AK-47', 0, 3);
        // Glow border
        ctx.strokeStyle = '#ff6b35';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(-15, -7, 30, 14, 3);
        ctx.stroke();
    } else {
        ctx.shadowColor = '#4caf50';
        // Health pack
        ctx.fillStyle = '#388e3c';
        ctx.beginPath();
        ctx.roundRect(-10, -10, 20, 20, 3);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillRect(-2, -7, 4, 14);
        ctx.fillRect(-7, -2, 14, 4);
        ctx.strokeStyle = '#66bb6a';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(-10, -10, 20, 20, 3);
        ctx.stroke();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawBullet(b) {
    ctx.save();
    ctx.fillStyle = b.color;
    ctx.shadowBlur = 8;
    ctx.shadowColor = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawParticle(p) {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
}

function drawAmmoBar() {
    const w = WEAPONS[player.weapon];
    const bar = document.getElementById('ammoBar');
    bar.innerHTML = '';
    for (let i = 0; i < w.maxAmmo; i++) {
        const d = document.createElement('div');
        d.className = 'bullet-dot' + (i < player.ammo ? '' : ' empty');
        bar.appendChild(d);
    }
}

// ===================== NOTIFICATIONS =====================
function showKillNotif(msg) {
    const el = document.getElementById('killNotif');
    el.textContent = msg;
    el.style.opacity = '1';
    setTimeout(() => el.style.opacity = '0', 1200);
}
function showWeaponPickupNotif(msg) {
    const el = document.getElementById('weaponPickupNotif');
    el.textContent = msg;
    el.style.opacity = '1';
    setTimeout(() => el.style.opacity = '0', 1800);
}
function showWaveNotif(msg) {
    const el = document.getElementById('waveNotif');
    el.textContent = msg;
    el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

// ===================== RELOAD =====================
function startReload() {
    if (player.reloading) return;
    const w = WEAPONS[player.weapon];
    if (player.ammo === w.maxAmmo) return;
    player.reloading = true;
    player.reloadTimer = w.reloadTime;
    showWeaponPickupNotif('🔄 Reloading...');
}

// ===================== SHOOTING =====================
function tryShoot(now) {
    if (player.reloading) return;
    const w = WEAPONS[player.weapon];
    if (now - player.lastShot < w.fireRate) return;
    if (player.ammo <= 0) { startReload(); return; }
    player.lastShot = now;
    player.ammo--;
    const cx = player.x + player.w/2;
    const cy = player.y + player.h/2;
    fireBullet(true, cx, cy, player.angle, player.weapon);
    drawAmmoBar();
    // Muzzle flash particle
    spawnParticles(
        cx + Math.cos(player.angle) * 26,
        cy + Math.sin(player.angle) * 26,
        WEAPONS[player.weapon].bulletColor, 3
    );
}

// ===================== GAME LOOP =====================
let mouseDown = false;

function update(dt, now) {
    // Player movement
    let dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;

    if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

    const nx = player.x + dx * player.speed;
    const ny = player.y + dy * player.speed;

    // Boundary + obstacle check
    const clampX = Math.max(0, Math.min(W - player.w, nx));
    const clampY = Math.max(0, Math.min(GROUND_Y - player.h, ny));
    if (!collidesWithObstacle(clampX, player.y, player.w, player.h)) player.x = clampX;
    if (!collidesWithObstacle(player.x, clampY, player.w, player.h)) player.y = clampY;

    if (dx !== 0 || dy !== 0) player.legAnim += 0.18;

    // Player angle to mouse
    const cx = player.x + player.w/2;
    const cy = player.y + player.h/2;
    player.angle = Math.atan2(mouseY - cy, mouseX - cx);

    // Auto-fire for AK47 or click for pistol
    const w = WEAPONS[player.weapon];
    if (mouseDown && (w.auto || !w.auto)) {
        if (w.auto || mouseDown) tryShoot(now);
    }

    // Reload timer
    if (player.reloading) {
        player.reloadTimer -= dt;
        if (player.reloadTimer <= 0) {
            player.reloading = false;
            player.ammo = WEAPONS[player.weapon].maxAmmo;
            drawAmmoBar();
            showWeaponPickupNotif('✅ Reloaded!');
        }
    }

    // Spawn enemies
    if (waveSpawnCount < waveEnemyCount) {
        waveSpawnTimer -= dt;
        if (waveSpawnTimer <= 0) {
            spawnEnemy();
            waveSpawnCount++;
            waveSpawnTimer = 600 + Math.random() * 800;
        }
    }

    // Update enemies
    enemies.forEach(e => {
        if (!e.alive) return;
        // Move toward player
        const ex = e.x + e.w/2;
        const ey = e.y + e.h/2;
        const px = player.x + player.w/2;
        const py = player.y + player.h/2;
        const dist = Math.hypot(px - ex, py - ey);
        e.angle = Math.atan2(py - ey, px - ex);

        if (dist > 60) {
            const edx = Math.cos(e.angle) * e.speed;
            const edy = Math.sin(e.angle) * e.speed;
            const enx = e.x + edx;
            const eny = e.y + edy;
            if (!collidesWithObstacle(enx, e.y, e.w, e.h)) e.x = enx;
            if (!collidesWithObstacle(e.x, eny, e.w, e.h)) e.y = eny;
            // Clamp to ground
            e.y = Math.min(GROUND_Y - e.h, e.y);
            e.legAnim += 0.15;
        }

        // Enemy shoots
        if (dist < 350 && now - e.lastEnemyShot > e.shootCooldown) {
            e.lastEnemyShot = now;
            fireBullet(false, ex, ey, e.angle, 'pistol');
        }

        // Melee attack
        if (rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
            if (now - e.lastAttack > e.attackRate) {
                player.hp -= e.damage;
                e.lastAttack = now;
                spawnParticles(player.x + player.w/2, player.y + player.h/2, '#e94560', 5);
                updateHPBar();
                if (player.hp <= 0) { gameOver(); }
            }
        }
    });

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        b.life--;

        // Out of bounds or life
        if (b.x < 0 || b.x > W || b.y < 0 || b.y > H || b.life <= 0) {
            bullets.splice(i, 1);
            continue;
        }

        // Hit obstacle
        let hitObstacle = false;
        for (const tile of MAP_TILES) {
            if (circleRect(b.x, b.y, b.r, tile.x, tile.y, tile.w, tile.h)) {
                spawnParticles(b.x, b.y, '#9e9e9e', 4);
                bullets.splice(i, 1);
                hitObstacle = true;
                break;
            }
        }
        if (hitObstacle) continue;

        if (b.fromPlayer) {
            // Hit enemies
            let hit = false;
            for (let j = enemies.length - 1; j >= 0; j--) {
                const e = enemies[j];
                if (!e.alive) continue;
                if (circleRect(b.x, b.y, b.r, e.x, e.y, e.w, e.h)) {
                    e.hp -= b.damage;
                    spawnParticles(b.x, b.y, '#ef9a9a', 6);
                    bullets.splice(i, 1);
                    hit = true;
                    if (e.hp <= 0) {
                        e.alive = false;
                        kills++;
                        document.getElementById('killCount').textContent = kills;
                        spawnParticles(e.x + e.w/2, e.y + e.h/2, e.elite ? '#f06292' : '#66bb6a', 14);
                        showKillNotif(e.elite ? '💀 ELITE KILLED! +3' : '💀 KILL!');
                        spawnPickup(e.x + e.w/2, e.y);
                    }
                    break;
                }
            }
        } else {
            // Hit player
            if (circleRect(b.x, b.y, b.r, player.x, player.y, player.w, player.h)) {
                player.hp -= b.damage;
                spawnParticles(b.x, b.y, '#e94560', 5);
                bullets.splice(i, 1);
                updateHPBar();
                if (player.hp <= 0) { gameOver(); return; }
            }
        }
    }

    // Remove dead enemies
    enemies = enemies.filter(e => e.alive);

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.12;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Update pickups
    for (let i = pickups.length - 1; i >= 0; i--) {
        const p = pickups[i];
        p.life--;
        if (p.life <= 0) { pickups.splice(i, 1); continue; }
        // Player collects
        if (rectOverlap(player.x, player.y, player.w, player.h, p.x - p.w/2, p.y - p.h/2, p.w, p.h)) {
            if (p.type === 'ak47') {
                player.weapon = 'ak47';
                player.ammo = WEAPONS.ak47.maxAmmo;
                player.reloading = false;
                document.getElementById('weaponName').textContent = 'AK-47';
                drawAmmoBar();
                showWeaponPickupNotif('🔥 AK-47 PICKED UP!');
            } else {
                const healed = Math.min(40, player.maxHp - player.hp);
                player.hp = Math.min(player.maxHp, player.hp + 40);
                updateHPBar();
                showWeaponPickupNotif(`💊 +${healed} HP!`);
            }
            pickups.splice(i, 1);
        }
    }

    // Check wave complete
    if (waveSpawnCount >= waveEnemyCount && enemies.length === 0) {
        setTimeout(() => startWave(wave + 1), 1800);
        waveSpawnCount = -9999; // prevent re-trigger
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    drawSky();
    drawStars();
    drawMountains();
    drawGround();
    drawObstacles();

    // Pickups
    pickups.forEach(drawPickup);

    // Player
    drawPerson(
        player.x, player.y, player.w, player.h,
        player.angle, player.color, player.bodyColor, '#0d47a1',
        player.legAnim, player.weapon, 0, 0, false
    );

    // Enemies
    enemies.forEach(e => {
        if (e.alive)
            drawPerson(e.x, e.y, e.w, e.h, e.angle, e.color, e.bodyColor, e.elite ? '#6a1040' : '#1b5e20', e.legAnim, 'pistol', e.hp, e.maxHp, e.elite);
    });

    // Bullets
    bullets.forEach(drawBullet);

    // Particles
    particles.forEach(drawParticle);

    // Reload indicator
    if (player.reloading) {
        const w = WEAPONS[player.weapon];
        const prog = 1 - player.reloadTimer / w.reloadTime;
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.arc(player.x + player.w/2, player.y - 18, 12, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = '#f5a623';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(player.x + player.w/2, player.y - 18, 12, -Math.PI/2, -Math.PI/2 + Math.PI*2*prog);
        ctx.stroke();
        ctx.restore();
    }
}

function updateHPBar() {
    const pct = Math.max(0, player.hp) / player.maxHp * 100;
    document.getElementById('hpText').textContent = Math.max(0, Math.floor(player.hp));
    document.getElementById('healthFill').style.width = pct + '%';
}

function gameLoop(timestamp) {
    if (!gameRunning) return;
    const dt = Math.min(timestamp - lastTime, 50);
    lastTime = timestamp;
    update(dt, timestamp);
    draw();
    animId = requestAnimationFrame(gameLoop);
}

function startGame() {
    // Reset everything
    player.x = W/2 - player.w/2;
    player.y = GROUND_Y - player.h - 10;
    player.hp = 100;
    player.weapon = 'pistol';
    player.ammo = WEAPONS.pistol.maxAmmo;
    player.reloading = false;
    player.lastShot = 0;
    player.legAnim = 0;
    kills = 0;
    wave = 0;
    enemies.length = 0;
    bullets.length = 0;
    particles.length = 0;
    pickups.length = 0;
    document.getElementById('killCount').textContent = '0';
    document.getElementById('weaponName').textContent = 'PISTOL';
    document.getElementById('overlay').style.display = 'none';
    updateHPBar();
    drawAmmoBar();
    generateMap();
    generateMountains();
    gameRunning = true;
    lastTime = performance.now();
    startWave(1);
    animId = requestAnimationFrame(gameLoop);
}

function gameOver() {
    gameRunning = false;
    cancelAnimationFrame(animId);
    const ov = document.getElementById('overlay');
    ov.innerHTML = `
        <h1>GAME OVER</h1>
        <h2>You were eliminated!</h2>
        <div id="scoreDisplay">💀 Kills: ${kills} &nbsp;|&nbsp; 🌊 Wave: ${wave}</div>
        <p>Final weapon: ${WEAPONS[player.weapon].name}</p>
        <button id="restartBtn" onclick="startGame()">🔄 PLAY AGAIN</button>
    `;
    ov.style.display = 'flex';
}

// ===================== INPUT =====================
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
});

canvas.addEventListener('mousedown', e => {
    if (e.button === 0) {
        mouseDown = true;
        if (gameRunning) tryShoot(performance.now());
    }
});
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === 'r' || e.key === 'R') startReload();
    e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

document.getElementById('startBtn').addEventListener('click', startGame);

// Auto-fire loop for AK47
setInterval(() => {
    if (!gameRunning) return;
    if (mouseDown && player.weapon === 'ak47') {
        tryShoot(performance.now());
    }
}, 50);

// Initial draw
generateMountains();
generateMap();
draw();
</script>
